<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tranquil. - playlists.</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header-section">
        <div class="header-content">
            <h1 class="page-title">🎵 Playlists</h1>
        </div>
    </header>
    
    <!-- Navigation -->
    <nav class="navbar">
        <ul class="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="library.html">Library</a></li>
            <li><a href="playlists.html">Playlists</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </nav>
    <div class="box-gray intro-section">
        <p class="glow">Welcome to the Playlists! Here you can create and manage your playlists, add songs to your playlists, and share your playlists with friends.</p>
    </div>

    <!-- CREATE PLAYLIST SECTION -->
    <div style="padding: 20px; background: #1a1a1a; border-radius: 10px; margin: 20px;">
        <h2 style="color: #1db954;">➕ Create New Playlist</h2>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="playlistNameInput" placeholder="Enter playlist name..." 
                   style="flex: 1; padding: 10px; border-radius: 5px; border: none; font-size: 14px;">
            <button id="createPlaylistBtn" style="padding: 10px 20px; background: #1db954; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Create</button>
        </div>
    </div>

    <!-- PLAYLISTS DISPLAY -->
    <div style="padding: 20px; background: #1a1a1a; border-radius: 10px; margin: 20px; margin-bottom: 150px;">
        <h2 style="color: #1db954;">🎵 Your Playlists</h2>
        <div id="playlistContainer"></div>
    </div>

    <!-- PLAYER -->
    <div id="playerContainer" style="position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 2px solid #1db954; padding: 15px; z-index: 1000;">
        <div id="nowPlaying" style="color: white; text-align: center; margin-bottom: 10px; font-size: 14px;">No song playing</div>
        
        <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
            <button id="prevBtn" style="padding: 10px 15px; background: #1db954; color: white; border: none; border-radius: 5px; cursor: pointer;" onclick="app.previousSong()">⏮ Prev</button>
            <button id="playBtn" style="padding: 10px 15px; background: #1db954; color: white; border: none; border-radius: 5px; cursor: pointer; display: none;" onclick="app.playSong()">▶ Play</button>
            <button id="pauseBtn" style="padding: 10px 15px; background: #ff6b6b; color: white; border: none; border-radius: 5px; cursor: pointer;" onclick="app.pauseSong()">⏸ Pause</button>
            <button id="nextBtn" style="padding: 10px 15px; background: #1db954; color: white; border: none; border-radius: 5px; cursor: pointer;" onclick="app.nextSong()">Next ⏭</button>
            <button id="favBtn" style="padding: 10px 15px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer;" onclick="app.currentSong && app.toggleFavorite(app.currentSong.id)">🤍 Favorite</button>
        </div>
        
        <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
            <span id="currentTime" style="color: #aaa; font-size: 12px; min-width: 35px;">0:00</span>
            <input type="range" id="progressBar" style="flex: 1; cursor: pointer;" value="0" min="0" max="100">
            <span id="duration" style="color: #aaa; font-size: 12px; min-width: 35px;">0:00</span>
            <label for="volumeControl" style="color: white; margin-left: 15px;">🔊</label>
            <input type="range" id="volumeControl" style="width: 100px; cursor: pointer;" value="70" min="0" max="100">
        </div>
        
        <audio id="audioPlayer"></audio>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            app.initializeAudioPlayer();
            app.displayPlaylists();

            document.getElementById('createPlaylistBtn').addEventListener('click', () => {
                const name = document.getElementById('playlistNameInput').value.trim();
                if (name) {
                    const result = app.createPlaylist(name);
                    alert(result.message);
                    if (result.success) {
                        document.getElementById('playlistNameInput').value = '';
                        app.displayPlaylists();
                    }
                } else {
                    alert('Please enter a playlist name');
                }
            });
        });
    </script>
</body>
</html>
